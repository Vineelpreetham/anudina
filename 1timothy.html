  // Create search overlay HTML
  const searchOverlay = document.createElement("div");
  searchOverlay.className = "search-overlay";
  searchOverlay.id = "search-overlay";
  searchOverlay.innerHTML = `
    <div class="search-header">
      <div class="search-title">Search Books</div>
      <button class="search-close" id="search-close">✕</button>
    </div>
    <div class="search-input-wrapper">
      <span class="search-input-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Type a book name (e.g. Genesis 1, Exodus 1)..." autocomplete="off">
    </div>
    <div class="search-results" id="search-results"></div>
  `;
  root.appendChild(searchOverlay);

  const searchBtn = document.getElementById("nav-search");
  const searchCloseBtn = document.getElementById("search-close");
  const searchInput = document.getElementById("search-input");
  const searchResults = document.getElementById("search-results");

  // Show search overlay
  function showSearch() {
    searchOverlay.classList.add("active");
    root.style.overflowY = "hidden";
    setTimeout(() => {
      searchInput.focus();
    }, 50);
  }

  // Hide search overlay
  function hideSearch() {
    searchOverlay.classList.remove("active");
    root.style.overflowY = "auto";
    searchInput.value = "";
    searchResults.innerHTML = "";
  }

  searchBtn.addEventListener("click", showSearch);
  searchCloseBtn.addEventListener("click", hideSearch);

  // Close search on escape key press
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && searchOverlay.classList.contains("active")) {
      hideSearch();
    }
  });

  // Perform filtering/search
  searchInput.addEventListener("input", () => {
    const query = searchInput.value.trim().toLowerCase();
    searchResults.innerHTML = "";

    if (query === "") {
      return;
    }

    const matchedBooks = books.filter(book => book.name.toLowerCase().includes(query) || (book.telugu && book.telugu.includes(query)));

    if (matchedBooks.length === 0) {
      searchResults.innerHTML = `<div class="search-no-results">No books found matching "${searchInput.value}"</div>`;
      return;
    }

    matchedBooks.forEach(book => {
      const matchIndex = book.name.toLowerCase().indexOf(query);
      let displayName = book.name;
      if (matchIndex !== -1) {
        const prefix = book.name.substring(0, matchIndex);
        const matchText = book.name.substring(matchIndex, matchIndex + query.length);
        const suffix = book.name.substring(matchIndex + query.length);
        displayName = `${prefix}<span style="color: #a38023; font-weight: 800;">${matchText}</span>${suffix}`;
      }

      const item = document.createElement("a");
      item.href = book.link;
      item.className = "search-result-item";
      item.innerHTML = `
        <div class="search-result-emoji">${book.emoji}</div>
        <div class="search-result-info">
          <div class="search-result-name">${displayName}</div>
          <div class="search-result-testament">${book.testament}</div>
        </div>
        <div class="search-result-arrow">→</div>
      `;
      searchResults.appendChild(item);
    });
  });

  // 6. SCROLL REVEAL ANIMATION (Intersection Observer with staggering)
  const cards = document.querySelectorAll(".hcard, .pcard, .video-card");
  
  cards.forEach(card => {
    card.classList.add("reveal-item");
  });

  const observerRoot = window.innerWidth >= 480 ? root : null;

  const revealObserver = new IntersectionObserver((entries, observer) => {
    const intersectingEntries = entries.filter(entry => entry.isIntersecting);
    
    if (intersectingEntries.length > 0) {
      intersectingEntries.sort((a, b) => {
        return a.target.getBoundingClientRect().top - b.target.getBoundingClientRect().top;
      });

      intersectingEntries.forEach((entry, idx) => {
        const card = entry.target;
        card.style.transitionDelay = `${idx * 75}ms`;
        card.classList.add("revealed");
        
        card.addEventListener("transitionend", function handler() {
          card.style.transitionDelay = "";
          card.removeEventListener("transitionend", handler);
        });
        
        observer.unobserve(card);
      });
    }
  }, {
    root: observerRoot,
    threshold: 0.04,
    rootMargin: "0px 0px -20px 0px"
  });

  cards.forEach(card => {
    revealObserver.observe(card);
  });
});
